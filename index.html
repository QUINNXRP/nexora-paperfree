var NEXORA_OFFLINE={
  online:navigator.onLine,
  queue:[],
  init:function(){
    var self=this;
    window.addEventListener("online",function(){self.online=true;self.sync();updateOfflineBar();});
    window.addEventListener("offline",function(){self.online=false;updateOfflineBar();});
  },
  save:function(){
    // Save all app data to a memory cache (works offline)
    try{
      window._nexoraCache={jobs:S.jobs,invoices:S.invoices||[],saved:new Date().toISOString()};
    }catch(e){}
  },
  queueAction:function(action){
    this.queue.push({action:action,time:new Date().toISOString()});
    this.save();
  },
  sync:function(){
    if(this.online&&this.queue.length>0){
      // When back online, sync queued actions
      var count=this.queue.length;
      this.queue=[];
      if(count>0)treeFactToastCustom("🔄 Synced!","Your "+count+" offline change"+(count>1?"s":"")+" synced successfully.");
    }
  }
};

function updateOfflineBar(){
  var existing=document.getElementById("offlineBar");
  if(existing)existing.remove();
  if(!NEXORA_OFFLINE.online){
    var bar=d({position:"fixed",top:"0",left:"0",right:"0",background:"linear-gradient(90deg,#f59e0b,#d97706)",color:"#fff",textAlign:"center",padding:"6px",fontSize:"12px",fontWeight:"700",zIndex:"9999"});
    bar.setAttribute("id","offlineBar");
    bar.innerHTML="📴 Offline Mode — Your work is being saved locally and will sync when you reconnect.";
    document.body.appendChild(bar);
  }
}

    pool.appendChild(emp);
  }
  unsch.forEach(function(j){pool.appendChild(makeJobChip(j,false));});
  wrap.appendChild(pool);

  // Day-of-week header
  var dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  wrap.appendChild(head);

  var firstDay=new Date(year,month,1);

  var daysInMonth=new Date(year,month+1,0).getDate();

  var todayISO=new Date().toISOString().slice(0,10);

  var grid=d({display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px"});

  var _loop=function(i){
    var dayNum=i-startOffset+1;

    if(inMonth){
      var cellDate=new Date(year,month,dayNum);
      iso=cellDate.getFullYear()+"-"+String(cellDate.getMonth()+1).padStart(2,"0")+"-"+String(cellDate.getDate()).padStart(2,"0");
    }

      border:"1.5px solid "+(isToday?C.cyn:C.bdr),borderRadius:"8px",padding:"5px",

      cell.addEventListener("dragleave",function(){cell.style.borderColor=isToday?C.cyn:C.bdr;});

        e.preventDefault();cell.style.borderColor=isToday?C.cyn:C.bdr;
        var jid=e.dataTransfer.getData("text/plain");

      if(dayJobs.length>3){
        var more=d({fontSize:"9px",color:C.mut,textAlign:"center",marginTop:"2px"});more.textContent="+"+(dayJobs.length-3)+" more";
        cell.appendChild(more);
      }
    }
    grid.appendChild(cell);
  };
  for(var i=0;i<totalCells;i++)_loop(i);
  wrap.appendChild(grid);

  var hint=d({fontSize:"11px",color:C.mut,textAlign:"center",marginTop:"14px"});
  hint.textContent="💡 Drag any job card onto a day to schedule it. The assigned tech is notified instantly.";
  wrap.appendChild(hint);
  return wrap;
}

function timeAgo(iso){
  var diff=(Date.now()-new Date(iso).getTime())/1000;
  if(diff<60)return "Just now";
  if(diff<3600)return Math.floor(diff/60)+"m ago";
  if(diff<86400)return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

function loadUsersFromFirebase(cb){
  if(!db){if(cb)cb();return;}
  try{
    db.ref("users").once("value").then(function(snap){
      var remote=snap.val()||{};
      Object.keys(remote).forEach(function(id){
        var ru=remote[id];
        if(!S.users.some(function(u){return u.username===ru.username;})){
          S.users.push(ru);
        }
      });
      if(cb)cb();
    }).catch(function(){if(cb)cb();});
  }catch(e){if(cb)cb();}
}

// ── NEW FEATURE: SCAN JOB CARD (OCR) ──────────────────────
// ══════════════════════════════════════════════════════════
var SCAN_FIELDS=[["ignore","Ignore"],["site","Site Name"],["town","Town"],["contact","Client Contact"],["phone","Phone"],["address","Address"],["description","Description"]];

function ocrGuessField(text){
  if(/(\+?27[\s-]?\d{9})|(\b0\d{2}[\s-]?\d{3}[\s-]?\d{4}\b)/.test(text))return "phone";
  if(/^(site|location|school|building)[:\s]/i.test(text))return "site";
  if(/^(town|city|suburb)[:\s]/i.test(text))return "town";
  if(/^(address|street)[:\s]/i.test(text))return "address";
  if(/^(contact|client|name)[:\s]/i.test(text))return "contact";
  return "description";
}

function runJobCardScan(file){
  S.scanning=true;S.scanProgress=0;render();
  var reader=new FileReader();
  reader.onload=function(ev){
    var imgData=ev.target.result;
    if(typeof Tesseract==="undefined"){
      S.scanning=false;alert("OCR engine failed to load. Check your internet connection and try again.");render();return;
    }
    Tesseract.recognize(imgData,"eng",{
      logger:function(m){if(m.status==="recognizing text"){S.scanProgress=Math.round((m.progress||0)*100);render();}}
    }).then(function(result){
      var lines=(result.data.text||"").split("\n").map(function(l){return l.trim();}).filter(function(l){return l.length>1;});
      S.scanLines=lines.map(function(l){return {text:l,assign:ocrGuessField(l)};});
      S.scanning=false;S.showScanReview=true;render();
    }).catch(function(err){
      S.scanning=false;alert("Couldn't read that image clearly. Try a clearer, well-lit photo.");render();
    });
  };
  reader.readAsDataURL(file);
}

function buildScanReview(){
  var ov=d({position:"fixed",inset:"0",background:"#000a",zIndex:"110",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"});
  var card=d({background:C.card,borderRadius:"18px",padding:"22px",width:"100%",maxWidth:"460px",border:"1px solid "+C.cyn+"44",maxHeight:"85vh",overflowY:"auto"});

  tp.appendChild(hd);tp.appendChild(btn("✕",function(){S.showScanReview=false;S.scanLines=null;render();},C.bdr,C.sft,{border:"none",padding:"5px 10px"}));
  card.appendChild(tp);
  var sub=d({fontSize:"12px",color:C.mut,marginBottom:"16px"});sub.textContent="We detected this text. Tell us which field each line belongs to, then apply it to your job card.";
  card.appendChild(sub);

  (S.scanLines||[]).forEach(function(ln,i){
    var row=d({background:"#07101f",border:"1px solid "+C.bdr,borderRadius:"9px",padding:"10px",marginBottom:"8px"});
    var tx=d({fontSize:"12px",color:C.txt,marginBottom:"6px",wordBreak:"break-word"});tx.textContent=ln.text;
    row.appendChild(tx);
    row.appendChild(sel(SCAN_FIELDS.map(function(f){return f[1];}),SCAN_FIELDS.find(function(f){return f[0]===ln.assign;})[1],function(v){
      ln.assign=SCAN_FIELDS.find(function(f){return f[1]===v;})[0];
    },{fontSize:"12px",padding:"7px 10px"}));
    card.appendChild(row);
  });

  card.appendChild(btn("✅ Apply to Job Card",function(){
    var descLines=[];
    (S.scanLines||[]).forEach(function(ln){
      if(ln.assign==="ignore")return;
      if(ln.assign==="description")descLines.push(ln.text);
      else S.njForm[ln.assign]=ln.text;
    });
    if(descLines.length){
      S.njForm.description=(S.njForm.description?S.njForm.description+"\n":"")+descLines.join("\n");
    }
    S.showScanReview=false;S.scanLines=null;
    try{treeFactToastCustom("📷 Scan Applied","Your job card fields have been filled in — please double-check before saving.");}catch(e){}
    render();
  },C.grn,"#fff",{width:"100%",fontSize:"14px",padding:"12px",fontWeight:"800",marginTop:"6px"}));

  ov.appendChild(card);
  return ov;
}

// ── PRINT REFLECTION GATE — nudge toward staying digital ──
// ══════════════════════════════════════════════════════════
function buildPrintGateModal(){
  var ov=d({position:"fixed",inset:"0",background:"#000c",zIndex:"120",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"});
  var card=d({background:C.card,borderRadius:"18px",padding:"24px",width:"100%",maxWidth:"440px",border:"1px solid "+C.grn+"44",maxHeight:"88vh",overflowY:"auto"});

  var icon=d({fontSize:"36px",textAlign:"center",marginBottom:"8px"});icon.textContent="🌳";
  card.appendChild(icon);
  var hd=d({fontSize:"17px",fontWeight:"800",textAlign:"center",marginBottom:"6px"});hd.textContent="Before you print...";
  var sub=d({fontSize:"12px",color:C.mut,textAlign:"center",marginBottom:"18px"});sub.textContent="Just three quick questions.";
  card.appendChild(hd);card.appendChild(sub);

  function q(num,text,color){
    var box=d({background:"#07101f",border:"1px solid "+C.bdr,borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"});
    var t=d({fontSize:"13px",color:C.txt,lineHeight:"1.6"});t.innerHTML="<b style='color:"+(color||C.org)+"'>"+num+".</b> "+text;
    box.appendChild(t);return box;
  }
  card.appendChild(q("1","Do you understand that printing this goes against everything NEXORA — and A Thousand Words — was built for?"));
  card.appendChild(q("2","Have you genuinely explored every other option before reaching for print?"));
  card.appendChild(q("3","Before you decide, please take 3–5 minutes to watch the <a href='https://athousandwordssavetrees.org' target='_blank' style='color:"+C.grn+";font-weight:800;text-decoration:underline'>short film on the A Thousand Words website</a>. If you still feel you need to print after that, go right ahead.",C.grn));

  card.appendChild(btn("🌳 Watch the film first",function(){window.open("https://athousandwordssavetrees.org","_blank");},"linear-gradient(135deg,"+C.grn+",#059669)","#fff",{width:"100%",fontSize:"14px",padding:"13px",fontWeight:"800",marginBottom:"10px"}));
  card.appendChild(btn("✕ Cancel — I'll stay digital",function(){S.printGate=false;render();},C.card,C.txt,{border:"1px solid "+C.bdr,width:"100%",fontSize:"13px",padding:"12px",fontWeight:"700",marginBottom:"12px"}));

  var divider=d({textAlign:"center",fontSize:"10px",color:C.mut,marginBottom:"10px"});divider.textContent="— or —";
  card.appendChild(divider);

  card.appendChild(btn("I understand — print anyway",function(){
    S.printGate=false;render();
    setTimeout(function(){window.print();},60);
  },"transparent",C.mut,{border:"1px solid "+C.bdr,width:"100%",fontSize:"11px",padding:"9px",fontWeight:"600"}));

  ov.appendChild(card);
  return ov;
}

// ── ACCESS REQUESTS — superadmin reviews invite requests ──
// ══════════════════════════════════════════════════════════
function buildAccessRequests(){
  var ov=d({position:"fixed",inset:"0",background:"#000a",zIndex:"100",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"});
  var card=d({background:C.card,borderRadius:"18px",padding:"22px",width:"100%",maxWidth:"560px",border:"1px solid "+C.grn+"44",maxHeight:"88vh",overflowY:"auto"});

  var tp=d({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"});
  var hd=d({fontSize:"16px",fontWeight:"800"});hd.textContent="📨 Access Requests";
  tp.appendChild(hd);tp.appendChild(btn("✕",function(){S.showAccessRequests=false;render();},C.bdr,C.sft,{border:"none",padding:"5px 10px"}));
  card.appendChild(tp);
  var sub=d({fontSize:"12px",color:C.mut,marginBottom:"18px"});sub.textContent="People requesting access to NEXORA. Review and reach out by email.";
  card.appendChild(sub);

  var pending=(S.accessRequests||[]).filter(function(r){return r.status==="pending";});
  var done=(S.accessRequests||[]).filter(function(r){return r.status!=="pending";});

  var pLbl=d({fontSize:"11px",fontWeight:"700",color:C.org,marginBottom:"8px",textTransform:"uppercase"});pLbl.textContent="⏳ Pending ("+pending.length+")";
  card.appendChild(pLbl);

  if(pending.length===0){
    var em=d({fontSize:"12px",color:C.mut,padding:"10px 0"});em.textContent="No pending requests.";
    card.appendChild(em);
  }

  function reqCard(r){
    var box=d({background:"#07101f",border:"1px solid "+C.bdr,borderRadius:"10px",padding:"14px",marginBottom:"10px"});
    var top=d({display:"flex",justifyContent:"space-between",marginBottom:"6px"});
    var nm=d({fontSize:"14px",fontWeight:"700"});nm.textContent=r.company;
    var st=d({fontSize:"9px",fontWeight:"700",padding:"3px 9px",borderRadius:"99px"});
    if(r.status==="approved"){st.style.background=C.grn+"22";st.style.color=C.grn;st.textContent="✓ APPROVED";}
    else if(r.status==="rejected"){st.style.background=C.red+"22";st.style.color=C.red;st.textContent="✕ REJECTED";}
    else{st.style.background=C.org+"22";st.style.color=C.org;st.textContent="⏳ PENDING";}
    top.appendChild(nm);top.appendChild(st);
    box.appendChild(top);
    var lines=[
      "👤 "+r.name+(r.isOwner==="yes"?" (Owner)":""),
      "✉️ "+r.email,
      "🏢 "+(r.regType==="company"?"Registered Company"+(r.vat?" · VAT: "+r.vat:""):"Private Individual"),
      "👥 "+r.staffCount+" staff members",
      "📣 Heard via: "+r.heardFrom,
      "🕐 "+r.submittedAt
    ];
    lines.forEach(function(l){
      var line=d({fontSize:"11px",color:C.sft,marginBottom:"3px"});line.textContent=l;
      box.appendChild(line);
    });
    if(r.status==="pending"){
      var acts=d({display:"flex",gap:"8px",marginTop:"10px"});
      acts.appendChild(btn("✅ Approve",function(){
        r.status="approved";
        if(db){try{db.ref("accessRequests/"+r.id+"/status").set("approved");}catch(e){}}
        render();
      },C.grn,"#fff",{fontSize:"12px",padding:"8px 14px",fontWeight:"700",flex:"1"}));
      acts.appendChild(btn("✕ Reject",function(){
        r.status="rejected";
        if(db){try{db.ref("accessRequests/"+r.id+"/status").set("rejected");}catch(e){}}
        render();
      },C.red+"22",C.red,{fontSize:"12px",padding:"8px 14px",fontWeight:"700",flex:"1"}));
      var emailBtn=h("a",{background:C.cyn,color:"#fff",borderRadius:"8px",padding:"8px 14px",fontSize:"12px",fontWeight:"700",textDecoration:"none",textAlign:"center",flex:"1",display:"flex",alignItems:"center",justifyContent:"center"},null,{
        href:"mailto:"+r.email+"?subject="+encodeURIComponent("Welcome to NEXORA, "+r.name+"!")+"&body="+encodeURIComponent("Hi "+r.name+",\n\nThanks for requesting access to NEXORA for "+r.company+"!\n\nHere are your login details:\nUsername: \nPassword: \n\nWelcome aboard!\n\n— The NEXORA Team\nsupport@nexorapaperfree.org")
      });
      emailBtn.textContent="✉️ Email";
      acts.appendChild(emailBtn);
      box.appendChild(acts);
    }
    return box;
  }

  pending.forEach(function(r){card.appendChild(reqCard(r));});

  if(done.length>0){
    var dLbl=d({fontSize:"11px",fontWeight:"700",color:C.sft,margin:"18px 0 8px",textTransform:"uppercase"});dLbl.textContent="Processed ("+done.length+")";
    card.appendChild(dLbl);
    done.forEach(function(r){card.appendChild(reqCard(r));});
  }

  ov.appendChild(card);
  return ov;
}


function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  if(S.page==="loading"){app.appendChild(buildLoader());return;}
  if(S.page==="about"){app.appendChild(buildAboutNexora());return;}
  if(S.page==="signup"){app.appendChild(buildSignup());return;}
  if(S.page==="requestSent"){app.appendChild(buildRequestSent());return;}
  if(S.page==="login"){app.appendChild(buildLogin());return;}
  app.appendChild(buildMain());
}
